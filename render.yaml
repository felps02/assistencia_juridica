services:
  - type: web
    name: assistencia-juridica-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WHATSAPP_NUMBER
        sync: false
      - key: NEXT_PUBLIC_COMPANY_EMAIL
        sync: false

  - type: web
    name: assistencia-juridica-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false
      - key: CONTACT_RESPONSE_TIME
        value: até 1 dia útil
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: UPLOAD_PROVIDER
        value: local
      - key: UPLOAD_DIR
        value: uploads
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

